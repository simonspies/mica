name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      - name: Install OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.x
      - name: Print OCaml version
        run: opam exec -- ocamlopt -version
      - name: Install Z3
        run: |
          Z3_VERSION=4.15.4
          curl -sSL -o z3.zip \
            "https://github.com/Z3Prover/z3/releases/download/z3-${Z3_VERSION}/z3-${Z3_VERSION}-x64-glibc-2.39.zip"
          unzip -q z3.zip
          sudo install "z3-${Z3_VERSION}-x64-glibc-2.39/bin/z3" /usr/local/bin/z3
          z3 --version
      - name: Test and compile examples
        run: opam exec -- lake run testsuite Examples/

  check-outlines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Regenerate directory outlines
        run: python3 scripts/file_overview.py Mica
      - name: Fail if outlines are stale
        run: git diff --exit-code
