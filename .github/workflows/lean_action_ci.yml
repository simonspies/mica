name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      - run: sudo apt-get update && sudo apt-get install -y z3
      - name: Test examples
        run: |
          lake run testsuite Examples/

  check-outlines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Regenerate directory outlines
        run: python3 scripts/file_overview.py Mica
      - name: Fail if outlines are stale
        run: git diff --exit-code
